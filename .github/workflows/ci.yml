name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
        env:
          # Tests must run without a real API key
          CI: 'true'

      - name: Doctor (smoke test)
        run: |
          node dist/bin/ovogogogo.js --doctor
          node dist/bin/ovogogogo.js --doctor --json
          node dist/bin/ovogogogo.js --doctor --strict --json || true

  doctor-smoke:
    name: Doctor smoke test
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify --doctor exits cleanly with valid settings
        run: |
          mkdir -p .ovogo
          cp .ovogo/settings.json.example .ovogo/settings.json
          node dist/bin/ovogogogo.js --doctor --strict --json | tee /tmp/doctor.json
          node -e 'const d = require("/tmp/doctor.json"); process.exit(d.settingsStatus === "ok" ? 0 : 1)'
      - name: Verify --doctor detects invalid settings
        run: |
          echo '{"runtime": {"maxIterations": "not a number"}}' > .ovogo/settings.json
          set +e
          node dist/bin/ovogogogo.js --doctor --strict --json > /tmp/doctor-bad.json
          rc=$?
          set -e
          echo "Exit code: $rc (expected non-zero)"
          test $rc -ne 0
          rm .ovogo/settings.json